schemaVersion: 1
workspace: dev
permission:
  default: allow
  rules:
    - endpoint: "system.exit"
      effect: deny
      note: "Never allow the CLI to exit SiYuan during local testing"
    - endpoint: "system.version"
      effect: allow
      note: "Keep a simple read-only health check available"
    - endpoint: "system.*"
      effect: confirm
      note: "Force the approval flow for the current approval UX tests"
    - notebook: "20231224140619-bpyuay4"
      action: write
      effect: approval
      note: "Test resource-level approval for notebook Test"
